<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" width="900" height="240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#12003a"/>
      <stop offset="100%" stop-color="#051428"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="screenLight" cx="50%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#2575fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2575fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightAmbient" cx="82%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#6a11cb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6a11cb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B6845"/>
      <stop offset="100%" stop-color="#7A4D2E"/>
    </linearGradient>
    <linearGradient id="outfit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#150d28"/>
    </linearGradient>
    <linearGradient id="laptopScreen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#080f1c"/>
      <stop offset="100%" stop-color="#0c1e38"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="900" height="240" fill="url(#bg)"/>
  <rect width="900" height="240" fill="url(#rightAmbient)"/>

  <!-- Dot grid -->
  <g fill="#6a11cb" opacity="0.07">
    <circle cx="60" cy="30" r="1.5"/><circle cx="120" cy="30" r="1.5"/><circle cx="180" cy="30" r="1.5"/>
    <circle cx="240" cy="30" r="1.5"/><circle cx="300" cy="30" r="1.5"/><circle cx="360" cy="30" r="1.5"/>
    <circle cx="420" cy="30" r="1.5"/><circle cx="480" cy="30" r="1.5"/>
    <circle cx="60" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="180" cy="80" r="1.5"/>
    <circle cx="240" cy="80" r="1.5"/><circle cx="300" cy="80" r="1.5"/><circle cx="360" cy="80" r="1.5"/>
    <circle cx="420" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/>
    <circle cx="60" cy="130" r="1.5"/><circle cx="120" cy="130" r="1.5"/><circle cx="180" cy="130" r="1.5"/>
    <circle cx="240" cy="130" r="1.5"/><circle cx="300" cy="130" r="1.5"/><circle cx="360" cy="130" r="1.5"/>
    <circle cx="420" cy="130" r="1.5"/><circle cx="480" cy="130" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/>
    <circle cx="240" cy="180" r="1.5"/><circle cx="300" cy="180" r="1.5"/><circle cx="360" cy="180" r="1.5"/>
    <circle cx="420" cy="180" r="1.5"/><circle cx="480" cy="180" r="1.5"/>
    <circle cx="60" cy="222" r="1.5"/><circle cx="120" cy="222" r="1.5"/><circle cx="180" cy="222" r="1.5"/>
    <circle cx="240" cy="222" r="1.5"/><circle cx="300" cy="222" r="1.5"/>
  </g>

  <!-- ===== NEURAL NETWORK ===== -->
  <!-- Node coords:
    Input: (30,60)(30,120)(30,180)
    H1: (100,42)(100,92)(100,142)(100,192)
    H2: (170,62)(170,117)(170,172)
    H3: (240,46)(240,100)(240,156)(240,202)
    H4: (310,66)(310,122)(310,177)
    H5: (380,50)(380,112)(380,172)
    Fade: (448,78)(448,132)(448,182)
    Ghost: (516,95)(516,145)
  -->
  <g fill="none" stroke-linecap="round">
    <!-- Input -> H1 -->
    <g stroke="#5020c0" stroke-width="0.65" opacity="0.45">
      <line x1="30" y1="60" x2="100" y2="42"/><line x1="30" y1="60" x2="100" y2="92"/>
      <line x1="30" y1="60" x2="100" y2="142"/><line x1="30" y1="120" x2="100" y2="42"/>
      <line x1="30" y1="120" x2="100" y2="92"/><line x1="30" y1="120" x2="100" y2="142"/>
      <line x1="30" y1="120" x2="100" y2="192"/><line x1="30" y1="180" x2="100" y2="92"/>
      <line x1="30" y1="180" x2="100" y2="142"/><line x1="30" y1="180" x2="100" y2="192"/>
    </g>
    <!-- H1 -> H2 -->
    <g stroke="#4518b8" stroke-width="0.65" opacity="0.42">
      <line x1="100" y1="42" x2="170" y2="62"/><line x1="100" y1="42" x2="170" y2="117"/>
      <line x1="100" y1="92" x2="170" y2="62"/><line x1="100" y1="92" x2="170" y2="117"/>
      <line x1="100" y1="92" x2="170" y2="172"/><line x1="100" y1="142" x2="170" y2="62"/>
      <line x1="100" y1="142" x2="170" y2="117"/><line x1="100" y1="142" x2="170" y2="172"/>
      <line x1="100" y1="192" x2="170" y2="117"/><line x1="100" y1="192" x2="170" y2="172"/>
    </g>
    <!-- H2 -> H3 -->
    <g stroke="#3810b0" stroke-width="0.65" opacity="0.38">
      <line x1="170" y1="62" x2="240" y2="46"/><line x1="170" y1="62" x2="240" y2="100"/>
      <line x1="170" y1="117" x2="240" y2="46"/><line x1="170" y1="117" x2="240" y2="100"/>
      <line x1="170" y1="117" x2="240" y2="156"/><line x1="170" y1="172" x2="240" y2="100"/>
      <line x1="170" y1="172" x2="240" y2="156"/><line x1="170" y1="172" x2="240" y2="202"/>
    </g>
    <!-- H3 -> H4 -->
    <g stroke="#2c0ca8" stroke-width="0.65" opacity="0.35">
      <line x1="240" y1="46" x2="310" y2="66"/><line x1="240" y1="100" x2="310" y2="66"/>
      <line x1="240" y1="100" x2="310" y2="122"/><line x1="240" y1="156" x2="310" y2="122"/>
      <line x1="240" y1="156" x2="310" y2="177"/><line x1="240" y1="202" x2="310" y2="122"/>
      <line x1="240" y1="202" x2="310" y2="177"/>
    </g>
    <!-- H4 -> H5 -->
    <g stroke="#2008a0" stroke-width="0.65" opacity="0.30">
      <line x1="310" y1="66" x2="380" y2="50"/><line x1="310" y1="66" x2="380" y2="112"/>
      <line x1="310" y1="122" x2="380" y2="50"/><line x1="310" y1="122" x2="380" y2="112"/>
      <line x1="310" y1="122" x2="380" y2="172"/><line x1="310" y1="177" x2="380" y2="112"/>
      <line x1="310" y1="177" x2="380" y2="172"/>
    </g>
    <!-- H5 -> Fade -->
    <g stroke="#180690" stroke-width="0.65" opacity="0.22">
      <line x1="380" y1="50" x2="448" y2="78"/><line x1="380" y1="112" x2="448" y2="78"/>
      <line x1="380" y1="112" x2="448" y2="132"/><line x1="380" y1="172" x2="448" y2="132"/>
      <line x1="380" y1="172" x2="448" y2="182"/>
    </g>
    <!-- Fade -> ghost -->
    <g stroke="#100480" stroke-width="0.65" opacity="0.10">
      <line x1="448" y1="78" x2="516" y2="95"/><line x1="448" y1="132" x2="516" y2="95"/>
      <line x1="448" y1="132" x2="516" y2="145"/><line x1="448" y1="182" x2="516" y2="145"/>
    </g>
  </g>

  <!-- Neural nodes -->
  <g filter="url(#glow)">
    <circle cx="30" cy="60" r="5" fill="#2575fc"/>
    <circle cx="30" cy="120" r="5.5" fill="#2575fc"/>
    <circle cx="30" cy="180" r="5" fill="#2575fc"/>
    <circle cx="100" cy="42" r="4.5" fill="#6a11cb"/>
    <circle cx="100" cy="92" r="5.5" fill="#6a11cb"/>
    <circle cx="100" cy="142" r="4.5" fill="#6a11cb"/>
    <circle cx="100" cy="192" r="4" fill="#6a11cb"/>
    <circle cx="170" cy="62" r="5" fill="#2575fc"/>
    <circle cx="170" cy="117" r="5.5" fill="#2575fc"/>
    <circle cx="170" cy="172" r="4.5" fill="#2575fc"/>
    <circle cx="240" cy="46" r="4" fill="#6a11cb"/>
    <circle cx="240" cy="100" r="5.5" fill="#6a11cb"/>
    <circle cx="240" cy="156" r="4.5" fill="#6a11cb"/>
    <circle cx="240" cy="202" r="4" fill="#6a11cb"/>
    <circle cx="310" cy="66" r="4.5" fill="#2575fc"/>
    <circle cx="310" cy="122" r="5.5" fill="#2575fc"/>
    <circle cx="310" cy="177" r="4" fill="#2575fc"/>
    <circle cx="380" cy="50" r="4" fill="#6a11cb"/>
    <circle cx="380" cy="112" r="5" fill="#6a11cb"/>
    <circle cx="380" cy="172" r="4" fill="#6a11cb"/>
  </g>
  <g filter="url(#glow)" opacity="0.48">
