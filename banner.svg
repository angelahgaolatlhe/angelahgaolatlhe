  <circle cx="716" cy="58" r="24" fill="#120500"/>
  <circle cx="756" cy="44" r="28" fill="#0a0200"/>
  <circle cx="796" cy="56" r="24" fill="#120500"/>
  <circle cx="700" cy="74" r="19" fill="#0f0400"/>
  <circle cx="810" cy="72" r="18" fill="#0f0400"/>
  <circle cx="734" cy="40" r="18" fill="#080200"/>
  <circle cx="778" cy="38" r="17" fill="#120500"/>
  <circle cx="756" cy="32" r="15" fill="#0a0200"/>
  <circle cx="720" cy="76" r="14" fill="#0d0300"/>
  <circle cx="790" cy="76" r="13" fill="#0d0300"/>
  <!-- Hair sheen -->
  <ellipse cx="742" cy="53" rx="22" ry="15" fill="#2a1000" opacity="0.42"/>

