  <path d="M 652 192 L 655 118 Q 655 110 663 110 L 814 110 Q 822 110 822 118 L 819 192 Z" fill="#1c2030"/>
  <!-- Screen surface -->
  <path d="M 658 192 L 661 115 L 816 115 L 813 192 Z" fill="url(#laptopScreen)"/>
  <!-- Screen content: bar chart -->
  <rect x="668" y="163" width="12" height="24" fill="#2575fc" opacity="0.9" rx="1"/>
  <rect x="684" y="150" width="12" height="37" fill="#6a11cb" opacity="0.9" rx="1"/>
  <rect x="700" y="157" width="12" height="30" fill="#2575fc" opacity="0.9" rx="1"/>
  <rect x="716" y="143" width="12" height="44" fill="#6a11cb" opacity="0.9" rx="1"/>
  <rect x="732" y="152" width="12" height="35" fill="#2575fc" opacity="0.9" rx="1"/>
  <rect x="748" y="145" width="12" height="42" fill="#6a11cb" opacity="0.9" rx="1"/>
  <!-- Trend line -->
  <polyline points="674,160 690,148 706,155 722,142 738,150 754,144 770,148"
            fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.85"/>
