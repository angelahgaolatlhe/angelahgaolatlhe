    <circle cx="448" cy="132" r="3.5" fill="#2575fc"/>
    <circle cx="448" cy="182" r="3" fill="#2575fc"/>
  </g>
  <g filter="url(#glow)" opacity="0.22">
    <circle cx="516" cy="95" r="2.8" fill="#6a11cb"/>
    <circle cx="516" cy="145" r="2.5" fill="#6a11cb"/>
  </g>

  <!-- ===== TEXT (LEFT) ===== -->
  <text x="50" y="88" font-family="'Georgia', serif" font-size="13" fill="#c084fc" opacity="0.7" letter-spacing="3">HEY, I'M</text>
  <text x="48" y="128" font-family="'Georgia', serif" font-size="34" font-weight="bold" fill="url(#titleGrad)" letter-spacing="1">Angelah Gaolatlhe</text>
  <line x1="48" y1="138" x2="380" y2="138" stroke="#6a11cb" stroke-width="1.2" opacity="0.5"/>
  <text x="50" y="158" font-family="'Courier New', monospace" font-size="11" fill="#2575fc" opacity="0.8" letter-spacing="1">Data Scientist  ·  ML Engineer  ·  Mathematician</text>
  <text x="50" y="180" font-family="'Courier New', monospace" font-size="10" fill="#c084fc" opacity="0.55">📍 AIMS Senegal  ·  🇧🇼 Botswana</text>
  <!-- Subtle binary decoration -->
