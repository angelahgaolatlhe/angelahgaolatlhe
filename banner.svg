  <circle cx="785" cy="147" r="2.5" fill="#2575fc" opacity="0.7"/>
  <circle cx="798" cy="139" r="3" fill="#00d4ff" opacity="0.65"/>
  <circle cx="806" cy="156" r="2" fill="#6a11cb" opacity="0.6"/>
  <!-- Code text on screen -->
  <text x="664" y="127" font-family="monospace" font-size="6.5" fill="#2575fc" opacity="0.85">▶ model.fit(X_train, y_train, epochs=50)</text>
  <text x="664" y="137" font-family="monospace" font-size="6.5" fill="#00d4ff" opacity="0.7">✓  accuracy: 94.2%  |  val_loss: 0.058</text>

  <!-- ---- BODY / CLOTHING ---- -->
  <path d="M 698 128
           C 678 140 664 164 660 192 L 658 210
           L 820 210
           C 818 188 804 158 790 128
           Z" fill="url(#outfit)"/>
  <!-- Collar V-neck -->
  <path d="M 744 128 L 734 148 L 743 158 L 752 148 L 742 128 Z" fill="#3e2060"/>
  <!-- Sleeve highlights (subtle fold lines) -->
  <path d="M 698 128 C 690 142 682 158 678 178" stroke="#3d2060" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 790 128 C 800 144 810 160 814 180" stroke="#3d2060" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Forearms (skin below sleeve) -->
